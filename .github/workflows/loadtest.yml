name: Load Test

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Which scenario to run'
        required: true
        type: choice
        options:
          - thundering_herd
          - sustained_load
          - correctness_check
      event_id:
        description: 'Event ID for correctness check (scenario 3 only)'
        required: false

jobs:
  deploy-loadtest-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_SSH_FINGERPRINT }}
          source: docker-compose.loadtest.yml
          target: ~/fairqueue-loadtest/

      - name: Start load test server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_SSH_FINGERPRINT }}
          # Increase timeout — migrations run on startup
          command_timeout: 120s
          script: |
            cd ~/fairqueue-loadtest

            # Write env file from secret
            echo "${{ secrets.LOADTEST_ENV_FILE }}" > .env

            # Pull latest image and start stack
            docker compose -f docker-compose.loadtest.yml pull
            docker compose -f docker-compose.loadtest.yml up -d

            # Wait for server to be healthy — up to 90 seconds
            echo "Waiting for load test server to be ready..."
            for i in $(seq 1 45); do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                http://localhost:8082/health || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "Server ready after $((i * 2)) seconds"
                break
              fi
              if [ $i -eq 45 ]; then
                echo "Server did not become ready in time"
                docker compose -f docker-compose.loadtest.yml logs loadtest-app
                exit 1
              fi
              sleep 2
            done

            # Seed organizer — idempotent, safe to call multiple times
            SEED_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8082/loadtest/seed)
            if [ "$SEED_STATUS" != "200" ]; then
              echo "Seed failed with status $SEED_STATUS"
              exit 1
            fi
            echo "Seed complete"

  run-loadtest:
    needs: deploy-loadtest-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run load test scenario
        run: |
          case "${{ inputs.scenario }}" in
            thundering_herd)
              SCRIPT="loadtest/scripts/01_thundering_herd.js"
              ;;
            sustained_load)
              SCRIPT="loadtest/scripts/02_sustained_load.js"
              ;;
            correctness_check)
              SCRIPT="loadtest/scripts/03_correctness_check.js"
              ;;
          esac

          k6 run \
            -e BASE_URL=https://loadtest-api.tulcanvcm.com \
            -e ORGANIZER_EMAIL=loadtest@admin.com \
            -e ORGANIZER_PASSWORD=loadtest-password \
            -e EVENT_ID=${{ inputs.event_id }} \
            $SCRIPT

  teardown-loadtest-server:
    # Depends on deploy, not run-loadtest, so it always runs
    # even if the load test itself fails or is skipped
    needs: deploy-loadtest-server
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Stop and clean up load test server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_SSH_FINGERPRINT }}
          script: |
            cd ~/fairqueue-loadtest
            docker compose -f docker-compose.loadtest.yml down -v
            echo "Load test stack torn down"